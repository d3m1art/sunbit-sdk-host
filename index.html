<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunbit Payment</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="status-wrapper" class="status-wrapper">
      <div class="spinner"></div>
      <svg class="error-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
        <line
          x1="12"
          y1="8"
          x2="12"
          y2="13"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <circle cx="12" cy="16.5" r="1" fill="currentColor" />
      </svg>
      <p id="status-message" class="status-message">Loading payment service...</p>
      <button id="retry-button" class="retry-button hidden">Try Again</button>
    </div>
    <button id="sunbit-trigger" class="sunbit-trigger"></button>
    <script src="https://static.sunbit.com/sdk/sunbit-sdk.js"></script>
    <script src="sunbit-init.js"></script>
  </body>
</html>
