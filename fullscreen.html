<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunbit Payment Path</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
    }
    #payment-path-container { 
      width: 100%; 
      height: 100%;
    }
    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 24px 48px;
      text-align: center;
      color: #666;
      font-size: 18px;
    }
    #status.error { color: #c00; }
    #status.hidden { display: none; }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #ccc;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 12px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="status"><span class="spinner"></span>Loading Sunbit SDK...</div>
  <div id="payment-path-container"></div>

  <script>
    (function() {
      var SUNBIT_KEY = 'x4d6ISJuu1xxhfoSAxnoKUwN2fWbE4R1';
      var statusElement = document.getElementById('status');

      function getConfigFromUrl() {
        var hash = window.location.hash.substring(1);
        if (hash) {
          try {
            return JSON.parse(decodeURIComponent(atob(hash)));
          } catch(e) {
            console.error('Failed to parse config from URL', e);
          }
        }
        return null;
      }

      function showStatus(message, isError) {
        statusElement.className = isError ? 'error' : '';
        statusElement.innerHTML = (isError ? '' : '<span class="spinner"></span>') + message;
      }

      function hideStatus() {
        statusElement.className = 'hidden';
      }

      var config = getConfigFromUrl();

      window.sunbitAsyncInit = function() {
        SUNBIT.init({
          sunbitKey: SUNBIT_KEY,
          enablePaymentPath: true,
          mode: 'DEMO'
        });

        if (!config || !config.token) {
          showStatus('No configuration provided', true);
          return;
        }

        showStatus('Initializing...');

        SUNBIT.PaymentPathModule.then(function(paymentPath) {
          paymentPath.init('#payment-path-container', {
            token: config.token,
            referenceId: config.referenceId,
            totalAmount: config.totalAmount,
            orderId: config.orderId,
            customerDetails: config.customerDetails || {},
            representativeDetails: config.representativeDetails || { email: 'merchant@payjunction.com' },
            onLoaded: function() {
              hideStatus();
            },
            onLinkSent: function() {
              console.log('Link sent');
            },
            onTokenExpired: function() {
              console.log('Token expired');
            }
          });
        }).catch(function(error) {
          showStatus('Error: ' + error.message, true);
        });
      };
    })();
  </script>
  <script async defer src="https://static.sunbit.com/sdk/sunbit-sdk.js"></script>
</body>
</html>
